name: Deploy EdgeTrack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: edge-track-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check TypeScript
        run: npx tsc --noEmit
      # 首次推送时，Wrangler 会根据无 ID 的 D1 binding 自动创建 edge-track。
      - name: Provision or update Worker binding
        run: npx wrangler deploy --x-provision
      - name: Apply unapplied D1 migrations
        run: npx wrangler d1 migrations apply edge-track --remote
      - name: Synchronize Worker secrets and deploy
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          SESSION_SIGNING_KEY: ${{ secrets.SESSION_SIGNING_KEY }}
        run: |
          secret_file="$(mktemp)"
          trap 'rm -f "$secret_file"' EXIT
          jq -n --arg password "$DASHBOARD_PASSWORD" --arg sessionKey "$SESSION_SIGNING_KEY" '{DASHBOARD_PASSWORD: $password, SESSION_SIGNING_KEY: $sessionKey}' > "$secret_file"
          npx wrangler secret bulk "$secret_file"
          npx wrangler deploy
